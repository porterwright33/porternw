<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trivia Game - Porter Wright</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #002e5d, #0062b8);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            text-align: center;
        }

        #game-container {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        #score-board {
            font-size: 1.1em;
            margin-bottom: 20px;
            color: #a8d0ff;
        }

        #question-text {
            font-size: 1.4em;
            margin-bottom: 30px;
            min-height: 60px;
            line-height: 1.5;
        }

        .answer-btn {
            display: block;
            width: 100%;
            padding: 14px 20px;
            margin: 10px 0;
            font-size: 1em;
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .answer-btn:hover:not(:disabled) {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }

        .answer-btn.correct { background: #27ae60; border-color: #27ae60; }
        .answer-btn.wrong   { background: #c0392b; border-color: #c0392b; }

        #feedback {
            margin-top: 18px;
            font-size: 1.1em;
            min-height: 28px;
            font-weight: bold;
        }

        #next-btn, #restart-btn {
            margin-top: 22px;
            padding: 12px 32px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #next-btn    { background: #f0c040; color: #002e5d; }
        #restart-btn { background: #ffffff; color: #002e5d; display: none; }

        #end-screen { display: none; }
        #end-screen h2 { font-size: 2em; margin-bottom: 10px; }
        #end-screen p  { font-size: 1.2em; color: #a8d0ff; }

        .progress {
            font-size: 0.9em;
            color: #a8d0ff;
            margin-bottom: 12px;
        }

        #exit-bar {
            width: 100%;
            max-width: 600px;
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        #exit-bar a {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255,255,255,0.15);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        #exit-bar a:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

<div id="exit-bar">
    <a href="fromscratch.html">← Back to Personal</a>
    <a href="index.html">Resume</a>
    <a href="about.html">About</a>
</div>

<div id="game-container">
    <h1>Trivia Challenge</h1>
    <div id="score-board">Score: <span id="score">0</span> | Best: <span id="best">0</span></div>

    <div id="quiz-screen">
        <div class="progress">Question <span id="q-num">1</span> of <span id="q-total">10</span></div>
        <div id="question-text">Loading...</div>
        <div id="answers"></div>
        <div id="feedback"></div>
        <button id="next-btn" style="display:none" onclick="nextQuestion()">Next Question →</button>
    </div>

    <div id="end-screen">
        <h2>Game Over!</h2>
        <p>You scored <span id="final-score"></span> out of <span id="final-total"></span>!</p>
        <br/>
        <button id="restart-btn" onclick="startGame()">Play Again</button>
    </div>
</div>

<script>
    const allQuestions = [
        { q: "What is the capital of the United States?", answers: ["New York", "Washington D.C.", "Los Angeles", "Chicago"], correct: 1 },
        { q: "How many sides does a hexagon have?", answers: ["5", "6", "7", "8"], correct: 1 },
        { q: "What planet is known as the Red Planet?", answers: ["Venus", "Jupiter", "Mars", "Saturn"], correct: 2 },
        { q: "Who wrote Romeo and Juliet?", answers: ["Charles Dickens", "Jane Austen", "William Shakespeare", "Mark Twain"], correct: 2 },
        { q: "What is the chemical symbol for water?", answers: ["O2", "H2O", "CO2", "NaCl"], correct: 1 },
        { q: "Which ocean is the largest?", answers: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: 3 },
        { q: "What year did World War II end?", answers: ["1943", "1944", "1945", "1946"], correct: 2 },
        { q: "What is 12 × 12?", answers: ["132", "144", "156", "124"], correct: 1 },
        { q: "What language is spoken in Brazil?", answers: ["Spanish", "French", "Portuguese", "Italian"], correct: 2 },
        { q: "Which university is located in Provo, Utah?", answers: ["Utah State University", "University of Utah", "BYU", "Westminster"], correct: 2 },
    ];

    let questions = [];
    let current = 0;
    let score = 0;
    let best = 0;
    let answered = false;

    function shuffle(arr) {
        return [...arr].sort(() => Math.random() - 0.5);
    }

    function startGame() {
        questions = shuffle(allQuestions).slice(0, 10);
        current = 0;
        score = 0;
        answered = false;
        document.getElementById('end-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        document.getElementById('restart-btn').style.display = 'none';
        document.getElementById('score').textContent = 0;
        document.getElementById('q-total').textContent = questions.length;
        loadQuestion();
    }

    function loadQuestion() {
        answered = false;
        const q = questions[current];
        document.getElementById('q-num').textContent = current + 1;
        document.getElementById('question-text').textContent = q.q;
        document.getElementById('feedback').textContent = '';
        document.getElementById('next-btn').style.display = 'none';

        const answersDiv = document.getElementById('answers');
        answersDiv.innerHTML = '';
        q.answers.forEach((ans, i) => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.textContent = ans;
            btn.onclick = () => selectAnswer(i, btn, q.correct);
            answersDiv.appendChild(btn);
        });
    }

    function selectAnswer(index, btn, correct) {
        if (answered) return;
        answered = true;

        const buttons = document.querySelectorAll('.answer-btn');
        buttons.forEach(b => b.disabled = true);
        buttons[correct].classList.add('correct');

        if (index === correct) {
            score++;
            document.getElementById('score').textContent = score;
            document.getElementById('feedback').textContent = '✓ Correct!';
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').textContent = '✗ Wrong! The correct answer was: ' + questions[current].answers[correct];
        }

        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
        current++;
        if (current >= questions.length) {
            endGame();
        } else {
            loadQuestion();
        }
    }

    function endGame() {
        if (score > best) best = score;
        document.getElementById('best').textContent = best;
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('end-screen').style.display = 'block';
        document.getElementById('final-score').textContent = score;
        document.getElementById('final-total').textContent = questions.length;
        document.getElementById('restart-btn').style.display = 'inline-block';
    }

    startGame();
</script>

</body>
</html>
